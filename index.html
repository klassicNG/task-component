<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card — Stage 0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article
      data-testid="test-todo-card"
      role="region"
      aria-label="Todo task: Redesign onboarding flow"
    >
      <div class="card-stripe" aria-hidden="true"></div>

      <div class="card-body">
        <!-- Header: checkbox + title + priority -->
        <div class="card-header">
          <div class="checkbox-wrap">
            <label for="todo-complete" class="sr-only"
              >Mark task as complete</label
            >
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
              role="checkbox"
              aria-label="Mark task as complete"
              aria-checked="false"
            />
          </div>

          <div class="title-group">
            <h2 data-testid="test-todo-title">Redesign the onboarding flow</h2>
            <span
              data-testid="test-todo-priority"
              class="priority-high"
              aria-label="Priority: High"
            >
              <span class="priority-dot" aria-hidden="true"></span>
              High
            </span>
          </div>
        </div>

        <!-- Description -->
        <p data-testid="test-todo-description">
          Audit the current 6-step onboarding, reduce friction points, and ship
          a streamlined 3-step version with inline validation and progress cues.
        </p>

        <!-- Status + Due date + Time remaining -->
        <div class="card-meta">
          <span
            data-testid="test-todo-status"
            class="status-in-progress"
            aria-label="Status: In Progress"
            >In Progress</span
          >

          <span class="meta-sep" aria-hidden="true">·</span>

          <time
            data-testid="test-todo-due-date"
            datetime="2026-04-15T18:00:00Z"
            aria-label="Due date: April 15, 2026"
            >Due Apr 15, 2026</time
          >

          <span class="meta-sep" aria-hidden="true">·</span>

          <span
            data-testid="test-todo-time-remaining"
            class="fine"
            aria-live="polite"
            aria-label="Time remaining"
            >Calculating…</span
          >
        </div>

        <!-- Tags -->
        <ul data-testid="test-todo-tags" role="list" aria-label="Task tags">
          <li data-testid="test-todo-tag-work" role="listitem">#work</li>
          <li data-testid="test-todo-tag-urgent" role="listitem">#urgent</li>
          <li data-testid="test-todo-tag-design" role="listitem">#design</li>
        </ul>
      </div>
      <!-- /card-body -->

      <!-- Footer actions -->
      <div class="card-footer">
        <button
          data-testid="test-todo-edit-button"
          class="icon-btn"
          aria-label="Edit task"
        >
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
            />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          <span>Edit</span>
        </button>

        <button
          data-testid="test-todo-delete-button"
          class="icon-btn"
          aria-label="Delete task"
        >
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
          <span>Delete</span>
        </button>
      </div>
    </article>

    <script src="main.js"></script>
  </body>
</html>
